name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install numpy pytest
      - run: python -c "from tools.registry import ToolRegistry; from tools.data_tools import describe_list; r=ToolRegistry(); r.register(describe_list); print(r.to_anthropic_tools()[0]['name']); print('OK')"