name: CI
"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install numpy pytest
      - run: python -c "from tools.registry import ToolRegistry; print('OK')"
      - run: python -c "from memory.agent_memory import AgentMemory; m=AgentMemory(); m.remember('k','v'); assert m.recall('k')=='v'; print('memory OK')"
      - run: python -c "from tools.data_tools import describe_list; import json; r=json.loads(describe_list([1.0,2.0,3.0],'x')); assert r['n']==3; print('tools OK')"
