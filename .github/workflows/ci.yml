name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install numpy pytest
      - run: python -c "from tools.registry import ToolRegistry; from tools.data_tools import describe_list, detect_outliers_zscore; r=ToolRegistry(); r.register(describe_list); r.register(detect_outliers_zscore); tools=r.to_anthropic_tools(); assert len(tools)==2; print('registry OK')"
      - run: python -c "from memory.agent_memory import AgentMemory; m=AgentMemory(); m.remember('test','value'); assert m.recall('test')=='value'; print('memory OK')"
      - run: python -c "from tools.data_tools import describe_list, detect_outliers_zscore, compute_correlation; import json; r=json.loads(describe_list([1.0,2.0,3.0,100.0],'x')); assert r['n']==4; print('data tools OK')"
